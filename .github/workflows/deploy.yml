name: Hexo自动部署GitHub Pages
on:
  push:
    branches: [ main ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取源码与子模块主题
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: 配置Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 全局安装Hexo CLI
        run: npm install -g hexo-cli

      - name: 安装项目依赖
        run: npm install

      - name: 清理并生成静态页面
        run: hexo clean && hexo generate

      # 新增：在静态站点根目录生成.nojekyll，上传到gh-pages分支
      - name: 写入.nojekyll 屏蔽Jekyll
        run: touch public/.nojekyll

      - name: 部署静态文件至gh-pages分支
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public