name: Hexo自动部署GitHub Pages
on:
  push:
    branches: [ main ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取源码
        uses: actions/checkout@v4

      - name: 配置Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装项目依赖
        run: npm install

      - name: 清理并生成静态页面
        run: hexo clean && hexo generate

      - name: 部署静态文件至gh-pages分支
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public